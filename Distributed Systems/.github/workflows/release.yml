name: Build deliverable ZIP

# Run it straight from GitHub: Actions tab -> "Build deliverable ZIP" -> Run workflow.
# It builds a clean .zip with only what the professor needs and publishes it as a Release.
# Just download the .zip from the Release and send it.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (re-running the same tag replaces the previous Release)"
        required: true
        default: entrega-t2

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build clean deliverable zip
        run: |
          set -euo pipefail
          NAME=g17-replication-t2
          mkdir -p "dist/$NAME"
          # git archive == tracked files only, so test-env/, __pycache__/ and *.pyc never come along.
          git archive HEAD | tar -x -C "dist/$NAME"
          cd "dist/$NAME"
          # Strip everything the professor does not need.
          rm -f  .gitignore
          rm -rf .github
          rm -f  slides/apresentacao.html      # keep only the PDF of the slides
          rm -f  demo/ROTEIRO.md               # internal demo-recording script
          rm -f  scripts/build_slides_pdf.sh   # internal slide-build tooling
          cd ..
          zip -r "$NAME.zip" "$NAME"
          ls -la

      - name: Publish Release with the zip
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # Make re-runs idempotent: drop a previous Release/tag with the same name first.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "dist/g17-replication-t2.zip" \
            --title "Trabalho 2 - Aplicação Distribuída (SMR)" \
            --notes "Entrega do Trabalho 2 (INE5418). Baixe \`g17-replication-t2.zip\` e envie ao professor. Contém código-fonte, instruções de execução (README) e os slides em PDF."
